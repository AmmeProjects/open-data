name: Weekly Data Update

on:
  schedule:
    - cron: '0 1 * * 1'   # 00:00 UTC Mondays
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-branch:
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.set_branch.outputs.branch_name }}
      branch_date: ${{ steps.set_branch.outputs.branch_date }}
    steps:
      - id: set_branch
        run: |
          WEEK=$(date -u '+%Y-W%V')
          echo "branch_name=weekly-update-$WEEK" >> $GITHUB_OUTPUT
          echo "branch_date=$WEEK" >> $GITHUB_OUTPUT

  update-data:
    needs: prepare-branch
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ needs.prepare-branch.outputs.branch_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync

      - name: Update Spain NAP
        continue-on-error: true
        run: |
          uv run python -m scripts.naps.spain
          uv run python -m src.utils.git_utils \
            data/naps/spain/locations.json \
            "$BRANCH_NAME" \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}" \
            "Automated Spain update"

      - name: Update Portugal NAP
        continue-on-error: true
        run: |
          uv run python -m scripts.naps.portugal
          uv run python -m src.utils.git_utils \
            data/naps/portugal/locations.json \
            data/naps/portugal/cpos.json \
            "$BRANCH_NAME" \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}" \
            "Automated Portugal update"

      - name: Update Mobie Tariffs
        continue-on-error: true
        run: |
          uv run python scripts/custom/mobie_tariffs.py
          uv run python -m src.utils.git_utils \
            data/naps/portugal/history_tariffs \
            "$BRANCH_NAME" \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}" \
            "Automated mobie_tariffs update"

  create-pr:
    name: Open or update PR
    needs:
      - prepare-branch
      - update-data
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      BRANCH_NAME: ${{ needs.prepare-branch.outputs.branch_name }}
      BRANCH_DATE: ${{ needs.prepare-branch.outputs.branch_date }}
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0
      - name: Create or View PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          existing_pr=$(gh pr list \
            --head "$BRANCH_NAME" \
            --base main \
            --state open \
            --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            echo "PR already exists: #$existing_pr"
          else
            TITLE="Weekly data update (${BRANCH_DATE})"
            BODY="Automated weekly data update for ${BRANCH_DATE}."
            gh pr create \
              --base main \
              --head "$BRANCH_NAME" \
              --title "$TITLE" \
              --body "$BODY" \
              --label "data update"
            echo "PR created."
          fi